- defaults:
    link:
      relink: true
      force: true
      create: true
      glob: true

- clean: ["~", "~/.oh-my-zsh/custom"]

- link:
    ~/.bashrc: bash/.bashrc
    ~/.zshrc: zsh/.zshrc
    ~/.oh-my-zsh/custom/:
      path: zsh/**
      exclude: [zsh/.zshrc]

- shell:
    - [git submodule update --init --recursive, Installing submodules]
