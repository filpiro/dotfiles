- defaults:
    link:
      relink: true
      force: true
      create: true
      glob: true

- clean: ["~", "~/.oh-my-zsh/custom", ~/.local/bin/git-commits-table, ~/.config/tmux/]

- link:
    ~/.bashrc: bash/.bashrc
    ~/.zshrc: zsh/.zshrc
    ~/.oh-my-zsh/custom/:
      path: zsh/**
      exclude: [zsh/.zshrc]
    ~/.tmux.conf: tmux/tmux.conf
    ~/.config/tmux/: 
      path: tmux/**
      exclude: [tmux/tmux.conf]
    ~/.local/bin/git-commits-table: bin/git-commits-table.sh
    

- shell:
    - [git submodule update --init --recursive, Installing submodules]
